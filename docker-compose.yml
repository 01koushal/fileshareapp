version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: local-file-share-server
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:5000
      MAX_FILE_SIZE_MB: 10
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
    container_name: local-file-share-client
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOST: 0.0.0.0
      PORT: 3000
      REACT_APP_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - server
